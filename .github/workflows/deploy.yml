name: Deploy Notes to GitHub Pages

on:
  # Trigger deployment on push to the main publishing branch
  push:
    branches: ["main"]
  # Allow manual trigger from the GitHub Actions tab
  workflow_dispatch:

# Set directory permissions required for secure OpenID Connect token authentication
permissions:
  contents: read
  pages: write
  id-token: write

# Prevent simultaneous redundant deployment executions
concurrency:
  group: "pages"
  cancel-in-progress: true

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 11

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: 'dashboard/pnpm-lock.yaml'

      - name: Install Dependencies & Build Dashboard
        run: |
          pnpm --dir dashboard install
          pnpm --dir dashboard build

      - name: Configure GitHub Pages Hosting Environment
        uses: actions/configure-pages@v5

      - name: Upload Static Portal Files Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dashboard/dist'

      - name: Deploy Live Artifact Payload to Target Environment
        id: deployment
        uses: actions/deploy-pages@v4
